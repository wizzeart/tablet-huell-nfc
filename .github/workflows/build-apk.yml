name: Build APK

# Compila el APK release firmado en cada push a master y en cada Pull Request.
# - push a master / ejecución manual → publica GitHub Release + sube artifact.
# - pull_request                     → solo compila y sube artifact (no publica Release).
on:
  push:
    branches: [ master ]
    paths-ignore:
      - '**/*.md'
      - '.github/modernize/**'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - '**/*.md'
      - '.github/modernize/**'
  workflow_dispatch:

permissions:
  contents: write   # necesario para crear el Release y adjuntar el APK

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true   # descargar .jar/.so/.onnx (Git LFS); sin esto llegan como punteros

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle 8.4
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      # ─── Reconstruir archivos sensibles (gitignoreados) desde GitHub Secrets ───

      - name: Restore secrets.properties
        env:
          SECRETS_PROPERTIES: ${{ secrets.SECRETS_PROPERTIES }}
        run: printf '%s' "$SECRETS_PROPERTIES" > secrets.properties

      - name: Restore RSA private key
        env:
          PRIVATE_KEY_PEM: ${{ secrets.PRIVATE_KEY_PEM }}
        run: |
          if [ -n "$PRIVATE_KEY_PEM" ]; then
            printf '%s' "$PRIVATE_KEY_PEM" > app/src/main/assets/private_key.pem
          else
            echo "::warning::PRIVATE_KEY_PEM no configurado — la app no podrá firmar peticiones a la API en runtime"
          fi

      - name: Decode signing keystore
        id: keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$SIGNING_KEYSTORE_BASE64" ]; then
            echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
            echo "signed=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "::warning::Sin SIGNING_KEYSTORE_BASE64 — el APK del PR saldrá sin firmar"
            echo "signed=false" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Falta el secret SIGNING_KEYSTORE_BASE64 — no se puede firmar el release"
            exit 1
          fi

      # ─── Build ────────────────────────────────────────────────────────────────

      - name: Build release APK
        env:
          KEYSTORE_FILE:     ${{ steps.keystore.outputs.signed == 'true' && format('{0}/release.jks', runner.temp) || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.SIGNING_KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          gradle assembleRelease \
            -PversionCodeOverride=${{ github.run_number }} \
            -PversionNameOverride=1.0.${{ github.run_number }} \
            --no-daemon --stacktrace

      - name: Locate & rename APK
        id: apk
        run: |
          mkdir -p dist
          SRC=$(find app/build/outputs/apk/release -name '*.apk' | head -n1)
          OUT="dist/petronova-kiosk-v1.0.${{ github.run_number }}.apk"
          cp "$SRC" "$OUT"
          echo "path=$OUT" >> "$GITHUB_OUTPUT"

      # ─── Publicar ──────────────────────────────────────────────────────────────

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: petronova-kiosk-apk
          path: ${{ steps.apk.outputs.path }}
          retention-days: 90

      - name: Publish GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }} (${{ github.sha }})"
          body: |
            APK generado automáticamente desde `master`.

            - Commit: ${{ github.sha }}
            - versionName: 1.0.${{ github.run_number }}
            - versionCode: ${{ github.run_number }}
          files: ${{ steps.apk.outputs.path }}
          make_latest: true
